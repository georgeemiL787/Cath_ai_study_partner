version: '3.8'

services:
  ai-study-partner:
    build: .
    ports:
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_DB_TYPE=faiss
      - VECTOR_DB_PATH=/app/data/vector_db
      - PRIVACY_MODE=local
      - DEBUG=True
    env_file:
      - .env
    restart: unless-stopped

